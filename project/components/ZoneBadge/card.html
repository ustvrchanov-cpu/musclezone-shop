<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Zone-Stempel</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { padding: 24px; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { ZoneBadge } = window.MuscleZoneDesignSystem_e8992e;

function Row({ label, children }) {
  return (
    <div style={{ display: 'grid', gap: 10 }}>
      <span className="mz-mono-label" style={{ color: 'var(--ink-muted)' }}>{label}</span>
      <div style={{ display: 'flex', gap: 16, alignItems: 'center', flexWrap: 'wrap' }}>{children}</div>
    </div>
  );
}

function Demo() {
  return (
    <div style={{ display: 'grid', gap: 28 }}>
      <Row label="Töne — umrandet, gerade">
        <ZoneBadge tone="accent">Bestseller</ZoneBadge>
        <ZoneBadge tone="ink">Vegan</ZoneBadge>
        <ZoneBadge tone="success">Abholbereit</ZoneBadge>
      </Row>
      <Row label="Solid — auf Fotos &amp; vollen Flächen">
        <ZoneBadge solid>−20 %</ZoneBadge>
        <ZoneBadge solid>Bestseller</ZoneBadge>
      </Row>
      <Row label="Optional minimal gedreht (rotate)">
        <ZoneBadge tone="accent" rotate={-2}>Neu</ZoneBadge>
      </Row>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
